version: "3.9"

services:
  analyzer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    volumes:
      - ../data_store:/app/data_store
    restart: unless-stopped
    command: python main.py --webui
    ports:
      - "8000:8000"

  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    volumes:
      - ../data_store:/app/data_store
    restart: unless-stopped
    command: python main.py --schedule
    profiles:
      - scheduler
